version: 2.1

orbs:
  node: circleci/node@5

jobs:
  backup-ci:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Backup CI
          command: npm run lint && npm run test

workflows:
  backup-ci:
    jobs:
      - backup-ci
